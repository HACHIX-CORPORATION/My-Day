AWSTemplateFormatVersion: '2010-09-09'
Description: >
  MyDay (Monday.com Clone) - Single EC2 deployment.
  MERN stack: React SPA served statically by Express on port 3030,
  fronted by Nginx reverse proxy. MongoDB 6.0 runs locally on the same instance.
  PM2 manages the Node.js process. ElasticIP provides a stable public address.
  GitHub Actions CI/CD via AWS OIDC + SSM Run Command (no SSH keys needed).

# -----------------------------------------------------------------------------
# PARAMETERS
# -----------------------------------------------------------------------------
Parameters:

  KeyPairName:
    Type: String
    Default: ''
    Description: >
      Name of an existing EC2 key pair for SSH access.
      Leave empty to use SSM Session Manager only (no port 22 needed).

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t2.micro
    Description: EC2 instance type. t3.micro / t2.micro are free-tier eligible.

  MongoDBName:
    Type: String
    Default: monday_DB
    Description: MongoDB database name.

  SecretKeySSMPath:
    Type: String
    Default: '/myday/prod/secret1'
    Description: >
      SSM Parameter Store path for the Cryptr/JWT secret (must be a SecureString).
      Pre-create before deploying: aws ssm put-parameter --name /myday/prod/secret1
      --type SecureString --value "$(openssl rand -base64 32)"

  GoogleClientIdSSMPath:
    Type: String
    Default: '/myday/prod/google_client_id'
    Description: >
      SSM Parameter Store path for the Google OAuth Client ID (String type, optional).
      If the parameter does not exist the app starts without Google Login - no error.

  GitHubRepoURL:
    Type: String
    Default: 'https://github.com/HACHIX-CORPORATION/My-Day.git'
    Description: HTTPS URL of the GitHub repository to clone.

  GitBranch:
    Type: String
    Default: main
    Description: Git branch to deploy.

  GitHubRepoOrg:
    Type: String
    Default: 'HACHIX-CORPORATION/My-Day'
    Description: >
      GitHub repository in the form Owner/Repo used to scope the GitHub Actions
      OIDC trust condition (e.g. HACHIX-CORPORATION/My-Day).


# -----------------------------------------------------------------------------
# CONDITIONS
# -----------------------------------------------------------------------------
Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

# -----------------------------------------------------------------------------
# RESOURCES
# -----------------------------------------------------------------------------
Resources:

  # -- Security Group ----------------------------------------------------------
  # Port 22 omitted - use SSM Session Manager for shell access (no key needed).
  # Port 3030 omitted - internal Node.js port, proxied by Nginx; never public.
  MyDaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'myday-sg-${AWS::StackName}'
      GroupDescription: MyDay application security group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: HTTP via Nginx
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: HTTPS (after TLS cert is attached)
      Tags:
        - Key: Name
          Value: !Sub 'myday-sg-${AWS::StackName}'
        - Key: Project
          Value: MyDay

  # -- IAM Role (enables SSM Session Manager + SSM Parameter Store reads) ------
  MyDayInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'myday-ec2-role-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: SSMParameterReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SecretKeySSMPath}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GoogleClientIdSSMPath}'
              - Effect: Allow
                Action: kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:ViaService': !Sub 'ssm.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Project
          Value: MyDay

  MyDayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub 'myday-ec2-profile-${AWS::StackName}'
      Roles:
        - !Ref MyDayInstanceRole

  # -- GitHub Actions IAM Role -------------------------------------------------
  # Trusted only by the HACHIX-CORPORATION/My-Day repo on the main branch.
  # Permissions: send SSM commands to this EC2 instance + poll their status.
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'myday-github-actions-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': 'sts.amazonaws.com'
                'token.actions.githubusercontent.com:sub':
                  !Sub 'repo:${GitHubRepoOrg}:ref:refs/heads/main'
      Policies:
        - PolicyName: SSMDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${MyDayEC2Instance}'
                  - !Sub 'arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript'
              - Effect: Allow
                Action: ssm:GetCommandInvocation
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*'
      Tags:
        - Key: Project
          Value: MyDay

  # -- EC2 Instance ------------------------------------------------------------
  MyDayEC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT60M
    Properties:
      # Dynamic reference - always resolves to the latest Amazon Linux 2 AMI
      # for the deployment region; no hardcoded AMI map needed.
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref MyDayInstanceProfile
      SecurityGroups:
        - !Ref MyDaySecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub 'myday-server-${AWS::StackName}'
        - Key: Project
          Value: MyDay
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

          # Always signal CloudFormation on exit - success or failure.
          # Without this trap, any 'set -e' early exit leaves CloudFormation
          # waiting until the CreationPolicy timeout expires.
          trap '/opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --region ${AWS::Region} --resource MyDayEC2Instance' EXIT

          echo "================================================================"
          echo " MyDay EC2 Bootstrap - $(date)"
          echo "================================================================"

          # -- 0. Pre-flight: verify required SSM parameter exists --------------
          # Fail immediately with a clear message rather than discovering the
          # missing secret 10 minutes later in the middle of the install.
          if ! aws ssm get-parameter \
              --name ${SecretKeySSMPath} \
              --with-decryption \
              --region ${AWS::Region} \
              --query Parameter.Value \
              --output text > /dev/null 2>&1; then
            echo "FATAL: SSM parameter '${SecretKeySSMPath}' not found." >&2
            echo "Pre-create it before deploying the stack:" >&2
            echo "  aws ssm put-parameter --name ${SecretKeySSMPath} --type SecureString --value YOUR_SECRET --region ${AWS::Region}" >&2
            exit 1
          fi
          echo "SSM parameter ${SecretKeySSMPath} - OK"

          # -- 1. System updates ------------------------------------------------
          yum update -y
          yum install -y git aws-cfn-bootstrap

          # Add 4 GB swap - React build on t3.micro needs ~900 MB heap + OS overhead.
          dd if=/dev/zero of=/swapfile bs=128M count=32
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile swap swap defaults 0 0' >> /etc/fstab

          # -- 2. Node.js 16 via NodeSource -------------------------------------
          # Node.js 18+ RPMs from NodeSource require glibc >= 2.28.
          # Amazon Linux 2 ships glibc 2.26, so Node.js 16 is the highest
          # version that installs cleanly. Node 16 runs this stack without issues.
          curl -fsSL https://rpm.nodesource.com/setup_16.x | bash -
          yum install -y nodejs
          node --version
          npm --version
          node --version
          npm --version

          # -- 3. MongoDB 6.0 ---------------------------------------------------
          cat > /etc/yum.repos.d/mongodb-org-6.0.repo <<'MONGOREPO'
          [mongodb-org-6.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2/mongodb-org/6.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://pgp.mongodb.com/server-6.0.asc
          MONGOREPO

          yum install -y mongodb-org

          # Bind only to localhost - port 27017 is never exposed publicly.
          sed -i 's/bindIp: 127.0.0.1/bindIp: 127.0.0.1/' /etc/mongod.conf

          systemctl enable mongod
          systemctl start mongod

          # Wait up to 30 s for mongod to become ready
          for i in $(seq 1 30); do
            mongosh --eval "db.runCommand({ ping: 1 })" --quiet && break
            sleep 1
          done

          # -- 4. Nginx + PM2 ---------------------------------------------------
          amazon-linux-extras install nginx1 -y || yum install -y nginx
          # Pin pm2 to v5 - pm2 v6+ requires Node >= 18; Node 16 is in use.
          npm install -g pm2@5

          # -- 5. Fetch secrets from SSM Parameter Store ------------------------
          # Secrets are stored in SSM as SecureString - never passed as plain-text
          # CloudFormation parameters or embedded in UserData.
          SECRET_VALUE=$(aws ssm get-parameter \
            --name ${SecretKeySSMPath} \
            --with-decryption \
            --query Parameter.Value \
            --output text \
            --region ${AWS::Region})

          GOOGLE_ID=$(aws ssm get-parameter \
            --name ${GoogleClientIdSSMPath} \
            --query Parameter.Value \
            --output text \
            --region ${AWS::Region} 2>/dev/null || echo '')

          # -- 6. Write app environment file ------------------------------------
          APP_ENV=/home/ec2-user/.env
          mkdir -p /home/ec2-user/logs
          cat > "$APP_ENV" <<ENVEOF
          NODE_ENV=production
          PORT=3030
          MONGODB_URI=mongodb://localhost:27017
          MONGODB_DB_NAME=${MongoDBName}
          SECRET1=${!SECRET_VALUE}
          GOOGLE_CLIENT_ID=${!GOOGLE_ID}
          ENVEOF
          chmod 600 "$APP_ENV"
          chown ec2-user:ec2-user "$APP_ENV"

          # -- 7. Clone the repository ------------------------------------------
          APP_DIR=/home/ec2-user/app
          git clone --branch ${GitBranch} --depth 1 ${GitHubRepoURL} "$APP_DIR"
          chown -R ec2-user:ec2-user "$APP_DIR"

          # -- 8. Patch backend/config/prod.js to read from env vars ------------
          # The original file hardcodes the MongoDB URI; overwrite it so the
          # connection string is taken from environment variables instead.
          cat > "$APP_DIR/backend/config/prod.js" <<'PRODCFG'
          module.exports = {
            dbURL: process.env.MONGODB_URI,
            dbName: process.env.MONGODB_DB_NAME || 'monday_DB'
          }
          PRODCFG
          chown ec2-user:ec2-user "$APP_DIR/backend/config/prod.js"

          # -- 9. Build React frontend ------------------------------------------
          cd "$APP_DIR/frontend"
          sudo -u ec2-user npm ci --prefer-offline
          sudo -u ec2-user env NODE_OPTIONS=--max-old-space-size=1536 npm run build

          # -- 10. Copy build output to backend/public (served by Express) ------
          mkdir -p "$APP_DIR/backend/public"
          cp -r "$APP_DIR/frontend/build/." "$APP_DIR/backend/public/"
          chown -R ec2-user:ec2-user "$APP_DIR/backend/public"

          # -- 11. Install backend dependencies ---------------------------------
          cd "$APP_DIR/backend"
          sudo -u ec2-user npm ci --prefer-offline

          # -- 12. Configure Nginx as reverse proxy -----------------------------
          # Includes WebSocket upgrade headers required by Socket.io.
          rm -f /etc/nginx/conf.d/default.conf

          cat > /etc/nginx/conf.d/myday.conf <<'NGINXCFG'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              proxy_http_version 1.1;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;

              location / {
                  proxy_pass http://127.0.0.1:3030;
              }

              location /health {
                  access_log off;
                  return 200 "OK\n";
                  add_header Content-Type text/plain;
              }
          }
          NGINXCFG

          nginx -t

          # -- 13. Start the app with PM2 ---------------------------------------
          # --env-file is used so PM2 always reloads vars from .env on process
          # restarts and reboots, not just the initial bootstrap shell session.
          sudo -u ec2-user bash -c "
            cd /home/ec2-user/app/backend
            pm2 start server.js \
              --name my-day \
              --env-file /home/ec2-user/.env \
              --log /home/ec2-user/logs/myday.log \
              --error /home/ec2-user/logs/myday-error.log \
              --merge-logs
            pm2 save
          "

          # -- 14. Wire PM2 to systemd so it survives reboots -------------------
          env PATH=$PATH:/usr/bin pm2 startup systemd -u ec2-user --hp /home/ec2-user
          sudo -u ec2-user pm2 save

          # -- 15. Enable and start Nginx ---------------------------------------
          systemctl enable nginx
          systemctl start nginx

          echo "================================================================"
          echo " Bootstrap complete - $(date)"
          echo "================================================================"
          # cfn-signal is sent automatically by the EXIT trap above.

  # -- Elastic IP --------------------------------------------------------------
  MyDayElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'myday-eip-${AWS::StackName}'
        - Key: Project
          Value: MyDay

  MyDayEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref MyDayEC2Instance
      EIP: !Ref MyDayElasticIP

# -----------------------------------------------------------------------------
# OUTPUTS
# -----------------------------------------------------------------------------
Outputs:

  PublicIP:
    Description: Static Elastic IP address of the MyDay server
    Value: !Ref MyDayElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'

  AppURL:
    Description: Application URL (HTTP). Set up HTTPS after attaching a TLS cert.
    Value: !Sub 'http://${MyDayElasticIP}'
    Export:
      Name: !Sub '${AWS::StackName}-AppURL'

  SSHCommand:
    Description: SSH command (requires KeyPairName parameter to be set)
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${MyDayElasticIP}'

  SSMCommand:
    Description: AWS CLI command to open a Session Manager shell (no key pair needed)
    Value: !Sub 'aws ssm start-session --target ${MyDayEC2Instance} --region ${AWS::Region}'

  InstanceId:
    Description: EC2 instance ID
    Value: !Ref MyDayEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  GitHubActionsRoleArn:
    Description: >
      IAM Role ARN for GitHub Actions OIDC authentication.
      Set this as the AWS_ROLE_ARN variable in GitHub repository settings
      (Settings -> Secrets and variables -> Actions -> Variables).
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GitHubActionsRoleArn'

  UserDataLog:
    Description: Bootstrap log path inside the instance
    Value: /var/log/user-data.log
