name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

# Cancel any in-progress deploy when a new push arrives.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write  # required to request the OIDC JWT
  contents: read

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          tar -czf /tmp/frontend-build.tar.gz -C build .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-MyDay-Deploy

      - name: Get stack outputs
        id: stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ vars.STACK_NAME }}" \
            --query "Stacks[0].Outputs" \
            --output json)

          INSTANCE_ID=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="InstanceId") | .OutputValue')
          BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="DeployBucketName") | .OutputValue')

          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "bucket=${BUCKET}"           >> "$GITHUB_OUTPUT"
          echo "Deploying to instance: ${INSTANCE_ID}, bucket: ${BUCKET}"

      - name: Upload build artifact to S3
        run: |
          aws s3 cp /tmp/frontend-build.tar.gz \
            s3://${{ steps.stack.outputs.bucket }}/frontend-build-latest.tar.gz

      - name: Send deployment command via SSM
        id: send-command
        run: |
          BUCKET="${{ steps.stack.outputs.bucket }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.stack.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }} by ${{ github.actor }}" \
            --parameters "commands=[
              \"set -euxo pipefail\",
              \"cd /home/ec2-user/app\",
              \"sudo -u ec2-user git fetch origin main\",
              \"sudo -u ec2-user git reset --hard origin/main\",
              \"aws s3 cp s3://${BUCKET}/frontend-build-latest.tar.gz /tmp/frontend-build.tar.gz\",
              \"rm -rf /home/ec2-user/app/backend/public\",
              \"mkdir -p /home/ec2-user/app/backend/public\",
              \"tar -xzf /tmp/frontend-build.tar.gz -C /home/ec2-user/app/backend/public/\",
              \"chown -R ec2-user:ec2-user /home/ec2-user/app/backend/public\",
              \"rm /tmp/frontend-build.tar.gz\",
              \"cd /home/ec2-user/app/backend\",
              \"sudo -u ec2-user npm ci --prefer-offline\",
              \"sudo -u ec2-user pm2 restart my-day --update-env\",
              \"sudo -u ec2-user pm2 save\",
              \"echo DEPLOY_OK\"
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM command sent: ${COMMAND_ID}"

      - name: Wait for deployment to complete
        run: |
          INSTANCE_ID="${{ steps.stack.outputs.instance_id }}"
          COMMAND_ID="${{ steps.send-command.outputs.command_id }}"

          echo "Polling command ${COMMAND_ID} on ${INSTANCE_ID}..."

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[${i}/60] Status: ${STATUS}"

            case "${STATUS}" in
              Success)
                echo "Deployment succeeded."
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut|Undeliverable|Terminated|InvalidPlatform)
                echo "Deployment FAILED — status: ${STATUS}"
                echo "=== STDOUT ==="
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardOutputContent" \
                  --output text || true
                echo "=== STDERR ==="
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
              Pending|InProgress|Delayed)
                sleep 10
                ;;
              *)
                echo "Unknown status '${STATUS}', retrying..."
                sleep 10
                ;;
            esac
          done

          echo "Timeout: command did not complete within 600 seconds"
          exit 1
